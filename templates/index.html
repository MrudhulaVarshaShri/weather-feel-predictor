<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Feel Predictor</title>

    <!-- Link to external CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Weather Feel Predictor</h2>

    <form method="POST">
        <input type="text" name="temperature" placeholder="Enter °C" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div>

            {% if result.error %}
                <p class="error">{{ result.error }}</p>
            {% else %}
                <div class="icon">{{ result.icon }}</div>

                <p>Temperature: {{ result.input }} °C</p>
                <p>Closest: {{ result.closest }} °C</p>

                <div class="label">{{ result.label }}</div>

                <p>{{ result.advice }}</p>
                <p>{{ result.explanation }}</p>
            {% endif %}

        </div>
    {% endif %}
</div>

</body>
</html>
